name: CD

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  NAMESPACE: ticketflow

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build & push des images vers l'ACR
        run: |
          az acr login --name "${{ secrets.ACR_LOGIN_SERVER }}"
          SHA="${{ github.sha }}"
          for svc in api worker payment-gateway; do
            img="${{ secrets.ACR_LOGIN_SERVER }}/ticketflow-$svc"
            docker build -t "$img:$SHA" -t "$img:latest" "backend/$svc"
            docker push "$img:$SHA"
            docker push "$img:latest"
          done
          img="${{ secrets.ACR_LOGIN_SERVER }}/ticketflow-frontend"
          docker build -t "$img:$SHA" -t "$img:latest" frontend
          docker push "$img:$SHA"
          docker push "$img:latest"

      - name: Connexion au cluster AKS
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_NAME }}

      - name: Deploiement sur l'AKS
        run: |
          SHA="${{ github.sha }}"
          REG="${{ secrets.ACR_LOGIN_SERVER }}"
          kubectl apply -f infra/k8s-aks/ticketflow.yaml
          kubectl set image deployment/api             api=$REG/ticketflow-api:$SHA                         -n $NAMESPACE
          kubectl set image deployment/worker          worker=$REG/ticketflow-worker:$SHA                   -n $NAMESPACE
          kubectl set image deployment/payment-gateway payment-gateway=$REG/ticketflow-payment-gateway:$SHA -n $NAMESPACE
          kubectl set image deployment/frontend        frontend=$REG/ticketflow-frontend:$SHA               -n $NAMESPACE
          kubectl rollout status deployment/api             -n $NAMESPACE --timeout=180s
          kubectl rollout status deployment/worker          -n $NAMESPACE --timeout=180s
          kubectl rollout status deployment/payment-gateway -n $NAMESPACE --timeout=120s
          kubectl rollout status deployment/frontend        -n $NAMESPACE --timeout=120s
