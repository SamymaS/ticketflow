apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-gateway
  namespace: ticketflow
  labels: { app: payment-gateway }
spec:
  replicas: 1
  selector:
    matchLabels: { app: payment-gateway }
  template:
    metadata:
      labels: { app: payment-gateway }
    spec:
      containers:
        - name: payment-gateway
          image: ticketflow-payment-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4200
          env:
            - name: PORT
              value: "4200"
            - name: FAILURE_RATE     # monter cette valeur pour démontrer le circuit breaker
              value: "0"
            - name: LATENCY_MS
              value: "50"
          livenessProbe:
            httpGet: { path: /healthz, port: 4200 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: payment-gateway
  namespace: ticketflow
spec:
  selector: { app: payment-gateway }
  ports:
    - port: 4200
      targetPort: 4200

