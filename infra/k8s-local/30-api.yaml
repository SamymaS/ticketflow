apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: ticketflow
  labels: { app: api }
spec:
  replicas: 3                      # API stateless => scalable horizontalement (ReplicaSet géré par K8s)
  selector:
    matchLabels: { app: api }
  template:
    metadata:
      labels: { app: api }
    spec:
      containers:
        - name: api
          image: ticketflow-api:latest
          imagePullPolicy: IfNotPresent   # remplacé par la CI (ACR) / le chart Helm
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef: { name: ticketflow-config }
            - secretRef: { name: ticketflow-secret }
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
          livenessProbe:
            httpGet: { path: /healthz, port: 4000 }
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /readyz, port: 4000 }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: ticketflow
spec:
  selector: { app: api }
  ports:
    - port: 80
      targetPort: 4000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api
  namespace: ticketflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api
  namespace: ticketflow
spec:
  minAvailable: 2                  # haute disponibilité pendant les opérations de maintenance
  selector:
    matchLabels: { app: api }

